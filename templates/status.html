<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作结果</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .status-container { background-color: #ffffff; padding: 40px 50px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1); text-align: center; border-left: 8px solid; }
        .status-container.success { border-left-color: #28a745; }
        .status-container.failure { border-left-color: #dc3545; }
        .status-container h2 { margin: 0 0 25px; font-size: 22px; font-weight: 500; color: #333; }
        .status-container a { display: inline-block; padding: 12px 30px; border-radius: 8px; background-color: #007bff; color: white; text-decoration: none; font-size: 16px; transition: background-color 0.3s; }
        .status-container.success a { background-color: #28a745; }
        .status-container.failure a { background-color: #6c757d; }
        .status-container a:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="status-container {{ 'success' if success else 'failure' }}">
        <h2>{{ message }}</h2>
        <a href="{{ back_url }}">返 回</a>
    </div>
</body>
</html>
