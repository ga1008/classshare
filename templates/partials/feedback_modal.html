<!-- Feedback Modal -->
<div class="modal-backdrop feedback-modal" id="feedback-modal" data-type="bug">
    <div class="modal modal-lg">
        <!-- Header -->
        <div class="modal-header">
            <h3 class="modal-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                问题反馈
            </h3>
            <div class="feedback-header-actions">
                <button type="button" class="fb-my-btn" id="fb-my-feedback-btn" title="我的反馈">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                    我的反馈
                </button>
                <button type="button" class="btn-close" data-dismiss="modal" aria-label="关闭"></button>
            </div>
        </div>

        <!-- Body -->
        <div class="modal-body">
            <!-- Tabs -->
            <div class="feedback-tabs" role="tablist">
                <button type="button" id="feedback-tab-bug" class="feedback-tab is-active" role="tab" aria-selected="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a4 4 0 0 1 4 4v2h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2V6a4 4 0 0 1 4-4z"></path>
                    </svg>
                    <span>Bug 修复</span>
                </button>
                <button type="button" id="feedback-tab-feature" class="feedback-tab" role="tab" aria-selected="false">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                    </svg>
                    <span>新功能反馈</span>
                </button>
                <button type="button" id="feedback-tab-report" class="feedback-tab" role="tab" aria-selected="false">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
                        <line x1="4" y1="22" x2="4" y2="15"></line>
                    </svg>
                    <span>举报</span>
                </button>
            </div>

            <!-- Success State -->
            <div id="feedback-success" class="feedback-success" hidden>
                <svg class="fb-success-icon" xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <h3>感谢您的反馈！</h3>
                <p id="feedback-success-message">您的反馈已成功提交，我们会尽快处理。每一份意见都让平台变得更好。</p>
                <div class="fb-success-actions">
                    <button type="button" class="fb-success-btn" id="fb-submit-another-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        再次提交反馈
                    </button>
                </div>
            </div>

            <!-- Form Panel -->
            <div id="feedback-form-panel">
                <form id="feedback-form">
                    <div class="feedback-form-body">
                        <!-- Section field -->
                        <div class="feedback-field" id="feedback-section-group">
                            <label>
                                所在板块
                                <span class="feedback-section-auto" id="feedback-section-auto-badge" style="margin-left: 0.5rem;">
                                    <span class="dot"></span>
                                    自动识别
                                </span>
                            </label>
                            <input type="text" id="feedback-section" placeholder="自动填入当前页面板块" readonly>
                        </div>

                        <!-- Title -->
                        <div class="feedback-field">
                            <label><span class="required-dot">*</span> 标题</label>
                            <input type="text" id="feedback-title" placeholder="请输入问题或建议的简要标题" maxlength="200" required>
                        </div>

                        <!-- Description -->
                        <div class="feedback-field">
                            <label><span class="required-dot">*</span> 详细描述</label>
                            <div class="feedback-emoji-toolbar">
                                <button type="button" id="feedback-emoji-toggle" class="feedback-emoji-btn" title="插入表情" style="visibility: hidden;">
                                    &#x1F60A;
                                </button>
                            </div>
                            <textarea id="feedback-description" placeholder="请详细描述：您进行了什么操作？出现了什么异常？期望的结果是什么？" maxlength="5000" required></textarea>
                            <div id="feedback-emoji-picker-wrap"></div>
                        </div>

                        <!-- Attachments -->
                        <div class="feedback-field">
                            <label>上传截图（可选，最多5张）</label>
                            <ol id="feedback-attachment-list" class="feedback-attachment-list"></ol>
                            <div style="margin-top: 0.5rem;">
                                <label class="feedback-upload-trigger" for="feedback-attachment-input">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                        <polyline points="21 15 16 10 5 21"></polyline>
                                    </svg>
                                    选择图片
                                </label>
                                <input type="file" id="feedback-attachment-input" accept="image/png,image/jpeg,image/gif,image/webp,image/bmp" multiple hidden>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <!-- My Feedback Panel -->
            <div class="fb-my-panel" id="fb-my-panel">
                <div class="fb-my-header">
                    <h4>我的反馈</h4>
                    <button type="button" class="fb-my-back-btn" id="fb-my-back-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                        返回提交
                    </button>
                </div>
                <div id="fb-my-content">
                    <div class="fb-my-spinner"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="modal-footer" id="feedback-footer">
            <span class="feedback-footer-hint">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                提交即表示您同意我们收集此反馈以改进产品
            </span>
            <button type="submit" id="feedback-submit-btn" class="feedback-submit-btn" form="feedback-form">
                <span class="feedback-submit-label">提交反馈</span>
                <span class="feedback-submit-spinner"></span>
            </button>
        </div>
    </div>
</div>
