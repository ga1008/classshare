<div class="modal-backdrop" id="student-security-modal">
    <div class="modal modal-sm">
        <div class="modal-header">
            <h3 class="modal-title">修改密码</h3>
            <button type="button" class="btn-close" data-dismiss="modal" aria-label="关闭"></button>
        </div>
        <div class="modal-body">
            {% if student_security_summary %}
            <div class="student-security-summary">
                <div class="student-security-summary-row">
                    <span>累计登录</span>
                    <strong>{{ student_security_summary.total_logins }} 次</strong>
                </div>
                {% if student_security_summary.last_login %}
                <div class="student-security-summary-row">
                    <span>最近登录</span>
                    <strong>{{ student_security_summary.last_login.logged_at }}</strong>
                </div>
                <div class="student-security-summary-row">
                    <span>最近设备</span>
                    <strong>{{ student_security_summary.last_login.device_label }}</strong>
                </div>
                {% endif %}
            </div>
            {% endif %}

            <form id="student-password-change-form">
                <div class="form-group">
                    <label class="form-label" for="current-password">当前密码</label>
                    <input class="form-control" type="password" id="current-password" name="current_password" required autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label class="form-label" for="new-password">新密码</label>
                    <input class="form-control" type="password" id="new-password" name="new_password" required autocomplete="new-password">
                    <span class="form-text">密码至少 8 位，且必须同时包含字母和数字。</span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm-new-password">确认新密码</label>
                    <input class="form-control" type="password" id="confirm-new-password" name="confirm_password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary w-full">保存新密码</button>
            </form>
        </div>
    </div>
</div>
