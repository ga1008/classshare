<div class="teacher-onboarding-modal" data-teacher-onboarding-modal hidden>
    <section
        class="teacher-onboarding-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="teacherOnboardingTitle"
        aria-describedby="teacherOnboardingPrompt"
    >
        <button
            type="button"
            class="teacher-onboarding-close"
            data-teacher-onboarding-dismiss
            aria-label="退出新建课堂引导"
        >
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
            </svg>
        </button>

        <header class="teacher-onboarding-welcome-area">
            <h2 id="teacherOnboardingTitle" data-onboarding-welcome>欢迎老师，接下来我们一起一步步完成课堂的开设</h2>
            <div class="teacher-onboarding-history" data-onboarding-history aria-label="已完成步骤"></div>
        </header>

        <main class="teacher-onboarding-main">
            <div class="teacher-onboarding-step-count" data-onboarding-step-count>第 1 步 / 共 8 步</div>
            <section class="teacher-onboarding-step-panel" data-onboarding-content aria-live="polite"></section>
        </main>

        <footer class="teacher-onboarding-footer">
            <button type="button" class="btn btn-outline" data-onboarding-prev>上一步</button>
            <div class="teacher-onboarding-footer-note" data-onboarding-footer-note>每一步只确认一件事，随时可以返回调整。</div>
            <button type="button" class="btn btn-primary" data-onboarding-next disabled>下一步</button>
        </footer>
    </section>

    <section
        class="teacher-onboarding-submodal"
        data-onboarding-submodal
        role="dialog"
        aria-modal="true"
        aria-labelledby="teacherOnboardingSubmodalTitle"
        hidden
    >
        <div class="teacher-onboarding-submodal-card">
            <header>
                <div>
                    <p class="teacher-onboarding-kicker">快速补充</p>
                    <h3 id="teacherOnboardingSubmodalTitle" data-submodal-title>新增</h3>
                </div>
                <button type="button" class="teacher-onboarding-close is-submodal" data-submodal-close aria-label="关闭">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M18 6 6 18"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </button>
            </header>
            <div class="teacher-onboarding-submodal-body" data-submodal-body></div>
        </div>
    </section>
</div>
