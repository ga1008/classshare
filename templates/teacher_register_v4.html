<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师注册</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h2 { margin: 0 0 30px; color: #28a745; }
        form { display: flex; flex-direction: column; }
        input { padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { padding: 15px; border-radius: 8px; border: none; background: #28a745; color: white; font-size: 18px; cursor: pointer; }
        .footer-link { margin-top: 20px; }
        .footer-link a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>创建教师账户</h2>
        <form action="/teacher/register" method="post">
            <input type="text" name="name" placeholder="您的姓名" required>
            <input type="email" name="email" placeholder="登录邮箱" required>
            <input type="password" name="password" placeholder="设置密码" required>
            <button type="submit">注 册</button>
        </form>
        <div class="footer-link">
            <a href="/teacher/login">已有账户？立即登录</a>
        </div>
    </div>
</body>
</html>
