{% extends "base_centered.html" %}

{% block title %}教师注册 - 课堂平台{% endblock %}

{% block bg_gradient %}background: linear-gradient(135deg, var(--bg-color) 0%, var(--success-light) 100%);{% endblock %}

{% block card_content %}
<div class="login-card">
    <div class="login-logo" style="background: var(--success-light); color: var(--success-color);">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
        </svg>
    </div>
    <h2>创建教师账户</h2>
    <p class="subtitle">填写以下信息，开启您的智慧课堂</p>

    <form action="/teacher/register" method="post">
        <div class="form-group text-left">
            <label class="form-label" for="name">真实姓名</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="如：张三老师" required autofocus>
        </div>
        <div class="form-group text-left">
            <label class="form-label" for="email">登录邮箱</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="your@email.com" required>
        </div>
        <div class="form-group text-left">
            <label class="form-label" for="password">设置密码</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="至少6位字符" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-success w-full btn-lg">注 册</button>
    </form>

    <div class="footer-links">
        <a href="/teacher/login">已有账户？立即登录 &rarr;</a>
    </div>
</div>
{% endblock %}
