<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发生错误 - {{ error_code }}</title>
    <link rel="stylesheet" href="/static/css/core.css">
    <link rel="stylesheet" href="/static/css/buttons.css">
    <style>
        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: var(--spacing-4);
        }

        .error-card {
            background-color: var(--surface-color);
            padding: var(--spacing-6) var(--spacing-8);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.4s ease;
        }

        .error-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: var(--danger-color);
            background: linear-gradient(90deg, var(--danger-color), #f87171);
        }

        .error-icon {
            color: var(--danger-color);
            margin-bottom: var(--spacing-4);
            display: inline-block;
            background: var(--danger-light);
            padding: var(--spacing-3);
            border-radius: var(--radius-full);
        }

        .error-code {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: var(--spacing-2);
            letter-spacing: -1px;
        }

        .error-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-4);
        }

        .error-message {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: var(--spacing-6);
            line-height: 1.6;
            background: var(--bg-color);
            padding: var(--spacing-4);
            border-radius: var(--radius-md);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </div>
        <div class="error-code">{{ error_code }}</div>
        <div class="error-title">{{ error_title }}</div>

        <div class="error-message">
            {{ error_message }}
        </div>

        <a href="{{ back_url or '/' }}" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            返回首页
        </a>
    </div>
</body>
</html>
