{% extends "base_centered.html" %}

{% block title %}学生登录 - 课堂平台{% endblock %}

{% block bg_gradient %}background: linear-gradient(135deg, var(--bg-color) 0%, var(--primary-light) 100%);{% endblock %}

{% block card_content %}
<div class="login-card">
    <div class="login-logo logo-student">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
    </div>
    <h2>学生登录</h2>
    <p class="subtitle">请输入您的真实姓名与学号进入课堂</p>

    <form action="/student/login" method="post">
        <div class="form-group text-left">
            <label class="form-label" for="name">姓名</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="请输入姓名" required autofocus>
        </div>
        <div class="form-group text-left">
            <label class="form-label" for="student_id_number">学号</label>
            <input type="text" id="student_id_number" name="student_id_number" class="form-control" placeholder="请输入学号" required>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg">登 录</button>
    </form>

    <div class="footer-links">
        <a href="/teacher/login" class="text-muted">我是教师，前往教师登录 &rarr;</a>
    </div>
</div>
{% endblock %}
