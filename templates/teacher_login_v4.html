<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师登录 - 课堂平台</title>
    <link rel="stylesheet" href="/static/css/core.css">
    <link rel="stylesheet" href="/static/css/forms.css">
    <link rel="stylesheet" href="/static/css/buttons.css">
    <link rel="stylesheet" href="/static/css/cards.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-color) 0%, var(--success-light) 100%);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: var(--spacing-xl);
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }
        .login-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto var(--spacing-lg);
            background: var(--success-light);
            color: var(--success-color);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-logo svg {
            width: 32px;
            height: 32px;
        }
        .login-card h2 {
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
        }
        .login-card p.subtitle {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xl);
            font-size: 0.875rem;
        }
        .footer-links {
            margin-top: var(--spacing-lg);
            font-size: 0.875rem;
            display: flex;
            justify-content: center;
            gap: var(--spacing-md);
        }
        .footer-links a {
            color: var(--text-muted);
        }
        .footer-links a:hover {
            color: var(--success-color);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
        </div>
        <h2>教师登录</h2>
        <p class="subtitle">管理您的课堂、资源与作业</p>

        <form action="/teacher/login" method="post">
            <div class="form-group text-left">
                <label class="form-label" for="email">邮箱</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="请输入教师邮箱" required autofocus>
            </div>
            <div class="form-group text-left">
                <label class="form-label" for="password">密码</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-success w-full btn-lg">登 录</button>
        </form>

        <div class="footer-links">
            <a href="/teacher/register">注册账户</a>
            <span class="text-muted">|</span>
            <a href="/student/login">返回学生登录</a>
        </div>
    </div>
</body>
</html>
