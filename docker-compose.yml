name: lanshare

x-lanshare-service: &lanshare-service
  build:
    context: .
    dockerfile: Dockerfile
    args:
      APP_VERSION: ${LANSHARE_TAG:-dev}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
  image: ${LANSHARE_IMAGE:-lanshare-app}:${LANSHARE_TAG:-latest}
  restart: unless-stopped
  init: true
  env_file:
    - ./docker.env
  volumes:
    - ./attendance:/app/attendance
    - ./chat_logs:/app/chat_logs
    - ./data:/app/data
    - ./homework_submissions:/app/homework_submissions
    - ./logs:/app/logs
    - ./rosters:/app/rosters
    - ./shared_files:/app/shared_files
    - ./storage:/app/storage
  networks:
    - lanshare

services:
  ai:
    <<: *lanshare-service
    command: ["ai"]
    environment:
      AI_HOST: 0.0.0.0
      AI_PORT: "8001"
      MAIN_APP_CALLBACK_URL: http://app:8000/api/internal/grading-complete
    expose:
      - "8001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/api/internal/health', timeout=5).status == 200 else 1)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  app:
    <<: *lanshare-service
    command: ["main"]
    depends_on:
      ai:
        condition: service_healthy
    environment:
      MAIN_HOST: 0.0.0.0
      MAIN_PORT: "8000"
      AI_ASSISTANT_URL: http://ai:8001
      MAIN_APP_CALLBACK_URL: http://app:8000/api/internal/grading-complete
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/internal/health', timeout=5).status == 200 else 1)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${LANSHARE_HTTP_PORT:-80}:80"
      - "${LANSHARE_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tools/guardianangel.net.cn_nginx:/etc/nginx/ssl:ro
    networks:
      - lanshare
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/api/internal/health >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  lanshare:
    driver: bridge
