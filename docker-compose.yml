name: lanshare

x-lanshare-service: &lanshare-service
  build:
    context: .
    dockerfile: Dockerfile
    args:
      APP_VERSION: ${LANSHARE_TAG:-dev}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
  image: ${LANSHARE_IMAGE:-lanshare-app}:${LANSHARE_TAG:-latest}
  restart: unless-stopped
  init: true
  env_file:
    - ./docker.env
  volumes:
    # Canonical runtime data root. Legacy mounts below keep upgrades safe until
    # `python tools/migrate_data_layout.py --apply --verify` has been run.
    - ./data:/app/data
    - ./attendance:/app/attendance
    - ./chat_logs:/app/chat_logs
    - ./homework_submissions:/app/homework_submissions
    - ./logs:/app/logs
    - ./rosters:/app/rosters
    - ./shared_files:/app/shared_files
    - ./storage:/app/storage
  networks:
    - lanshare

x-lanshare-timezone: &lanshare-timezone
  TZ: ${TZ:-Asia/Shanghai}
  APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}

services:
  ai:
    <<: *lanshare-service
    command: ["ai"]
    environment:
      <<: *lanshare-timezone
      AI_HOST: 0.0.0.0
      AI_PORT: "8001"
      MAIN_APP_CALLBACK_URL: http://app:8000/api/internal/grading-complete
    expose:
      - "8001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/api/internal/health', timeout=5).status == 200 else 1)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  app:
    <<: *lanshare-service
    command: ["main"]
    depends_on:
      ai:
        condition: service_healthy
    environment:
      <<: *lanshare-timezone
      MAIN_HOST: 0.0.0.0
      MAIN_PORT: "8000"
      AI_ASSISTANT_URL: http://ai:8001
      MAIN_APP_CALLBACK_URL: http://app:8000/api/internal/grading-complete
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/internal/health', timeout=5).status == 200 else 1)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  mailer:
    <<: *lanshare-service
    command: ["mailer"]
    environment:
      <<: *lanshare-timezone
      EMAIL_WORKER_ID: mailer-compose
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - from classroom_app.services.email_notification_service import email_worker_health_snapshot; import sys; snapshot=email_worker_health_snapshot(); sys.exit(0 if snapshot.get('ok') else 1)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  blog-crawler:
    <<: *lanshare-service
    command: ["blog-crawler"]
    depends_on:
      ai:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      <<: *lanshare-timezone
      BLOG_NEWS_CRAWLER_WORKER_ID: blog-crawler-compose
      BLOG_NEWS_CRAWLER_POLL_SECONDS: "60"
      AI_ASSISTANT_URL: http://ai:8001

  scheduler:
    <<: *lanshare-service
    command: ["scheduler"]
    depends_on:
      app:
        condition: service_healthy
    environment:
      <<: *lanshare-timezone
      SCHEDULER_WORKER_ID: scheduler-compose
      SCHEDULER_POLL_SECONDS: "20"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - from classroom_app.services.scheduled_task_service import scheduler_health_snapshot; import sys; snapshot=scheduler_health_snapshot(); sys.exit(0 if snapshot.get('ok') else 1)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  deepseek-runtime:
    image: ghcr.io/hmbown/deepseek-tui:${DEEPSEEK_TUI_TAG:-latest}
    restart: unless-stopped
    init: true
    env_file:
      - ./docker.env
    environment:
      <<: *lanshare-timezone
    command: ["serve", "--http", "--host", "0.0.0.0", "--port", "7878", "--workers", "${DEEPSEEK_TUI_WORKERS:-2}"]
    volumes:
      - ./data/agent_tasks/deepseek_home:/home/deepseek/.deepseek
      - ./data/agent_tasks:/workspace
    expose:
      - "7878"
    networks:
      - lanshare

  agent-worker:
    <<: *lanshare-service
    command: ["agent-worker"]
    depends_on:
      app:
        condition: service_healthy
      deepseek-runtime:
        condition: service_started
    environment:
      <<: *lanshare-timezone
      AGENT_TASK_RUNTIME_URL: http://deepseek-runtime:7878
      AGENT_TASK_RUNTIME_WORKSPACE_PREFIX: /workspace/tasks
      AGENT_TASK_WORKER_ID: agent-worker-compose
      # 允许运行时使用 shell：Agent 通过 curl 调平台桥接接口（只读）并可直接联网
      AGENT_TASK_ALLOW_RUNTIME_SHELL: "1"
      AGENT_BRIDGE_BASE_URL: http://app:8000

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${LANSHARE_HTTP_PORT:-80}:80"
      - "${LANSHARE_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tools/guardianangel.net.cn_nginx:/etc/nginx/ssl:ro
    networks:
      - lanshare
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/api/internal/health >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  lanshare:
    driver: bridge
