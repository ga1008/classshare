# 定义上游的 FastAPI 应用服务器
upstream fast_app {
    # 'app' 是 docker-compose.yml 中定义的服务名
    # 8000 是 main.py 在容器内监听的端口
    server app:8000;
}

server {
    listen 80;
    server_name _; # 监听所有域名

    # 1. 静态文件处理
    # Nginx 将接管所有 /static/ 开头的请求
    location /static/ {
        # '/var/www/static/' 是 Nginx 容器内
        # 挂载了 'static_volume' 的路径
        alias /var/www/static/;

        autoindex off;
        expires 30d; # 缓存 30 天
        add_header Cache-Control "public";
    }

    # 2. 所有其他请求 (API, HTML 页面等)
    # 全部转发给后端的 FastAPI (app 服务)
    location / {
        proxy_pass http://fast_app;

        # 设置必要的 HTTP 头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # (可选) 增加对 WebSocket 的支持 (如果您的聊天功能需要)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}